services:
  web:
    build: .
    container_name: signeditona-web
    restart: unless-stopped
    expose:
      - "4321"
    labels:
      - "traefik.enable=true"

      # Primary route — signeditona.com (apex) + www
      - "traefik.http.routers.signeditona-apex.rule=Host(`signeditona.com`)"
      - "traefik.http.routers.signeditona-apex.tls=true"
      - "traefik.http.routers.signeditona-apex.tls.certresolver=letsencrypt"
      - "traefik.http.routers.signeditona-apex.entrypoints=websecure"
      - "traefik.http.services.signeditona.loadbalancer.server.port=4321"

      # www.signeditona.com → 301 redirect to apex
      - "traefik.http.routers.signeditona-www.rule=Host(`www.signeditona.com`)"
      - "traefik.http.routers.signeditona-www.tls=true"
      - "traefik.http.routers.signeditona-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.signeditona-www.entrypoints=websecure"
      - "traefik.http.routers.signeditona-www.middlewares=signeditona-www-redirect"
      - "traefik.http.middlewares.signeditona-www-redirect.redirectregex.regex=^https?://www\\.signeditona\\.com(.*)"
      - "traefik.http.middlewares.signeditona-www-redirect.redirectregex.replacement=https://signeditona.com$${1}"
      - "traefik.http.middlewares.signeditona-www-redirect.redirectregex.permanent=true"

      # Staging route — signe.midimaze.com (kept as permanent preview URL)
      - "traefik.http.routers.signeditona-staging.rule=Host(`signe.midimaze.com`)"
      - "traefik.http.routers.signeditona-staging.tls=true"
      - "traefik.http.routers.signeditona-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.signeditona-staging.entrypoints=websecure"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
